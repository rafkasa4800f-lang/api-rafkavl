<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suntik Canva Pro — Rafkavl API</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #09090b; --card: #18181b; --txt: #f4f4f5; --green: #22c55e; --border: #27272a; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--txt); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .wrapper { background: var(--card); border: 1px solid var(--border); padding: 28px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .title { font-size: 16px; font-weight: 600; color: #38bdf8; margin-bottom: 20px; text-align: center; border-bottom: 1px dashed var(--border); padding-bottom: 10px; }
        label { font-size: 11px; color: #a1a1aa; display: block; margin: 12px 0 4px; }
        input { width: 100%; background: #09090b; border: 1px solid #3f3f46; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 12px; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; margin-top: 20px; background: #ea580c; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.2s; }
        button:hover { background: #c2410c; }
        .log-box { margin-top: 15px; background: #000; border: 1px solid var(--border); padding: 10px; font-size: 11px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="title">⚡ AUTO-INVITE CANVA PRO</div>
    
    <label>API KEY</label>
    <input type="text" id="apikey" placeholder="Ketik apikey lu...">

    <label>EMAIL CUSTOMER</label>
    <input type="email" id="email" placeholder="target@gmail.com">

    <button onclick="tembak()">SUNTIK SEKARANG</button>

    <div class="log-box" id="log"></div>
</div>

<script>
async function tembak() {
    const key = document.getElementById('apikey').value.trim();
    const target = document.getElementById('email').value.trim();
    const log = document.getElementById('log');

    if(!key || !target) return alert("Wajib diisi semua bos!");

    log.style.display = 'block';
    log.style.color = '#facc15';
    log.innerHTML = "Memeriksa sisa limit ke Spreadsheet...";

    try {
        const res = await fetch('/api/apk/canva/execute', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ apikey: key, email_cust: target })
        });

        const data = await res.json();

        if(data.status) {
            log.style.color = '#4ade80';
            log.innerHTML = `<b>SUKSES!</b><br>${data.msg}<br><br><i>Sisa Limit [${data.pemilik_key}]: ${data.sisa_limit}</i>`;
        } else {
            log.style.color = '#f87171';
            log.innerHTML = `<b>GAGAL:</b> ${data.msg}`;
        }
    } catch(e) {
        log.style.color = '#f87171';
        log.innerHTML = "Koneksi ke backend Express terputus.";
    }
}
</script>

</body>
</html>
